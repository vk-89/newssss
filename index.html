<!DOCTYPE html>
<html lang="en" data-theme="paper">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Shabd — Newspaper Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ============================= TOKENS ============================= */
:root{
  --font-display:'Playfair Display', Georgia, serif;
  --font-ui:'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  --font-mono:'IBM Plex Mono', ui-monospace, monospace;
  --font-hi:'Noto Sans Devanagari', var(--font-ui);
  --radius:10px;
}
[data-theme="paper"]{
  --bg:#E7E0CB; --bg-elevated:#F4EFDE; --ink:#24211A; --ink-soft:#5B5544;
  --rule:#C9BE9C; --accent:#2B4570; --accent-soft:#DEE6EF; --signature:#A5402F;
  --card-bg:#FBF7EC; --canvas-filter:none; --canvas-frame:#FFFFFF;
}
[data-theme="bright"]{
  --bg:#FFFFFF; --bg-elevated:#FFFFFF; --ink:#16140F; --ink-soft:#514B3D;
  --rule:#E1DBC8; --accent:#2B4570; --accent-soft:#E7EDF5; --signature:#A5402F;
  --card-bg:#FFFFFF; --canvas-filter:none; --canvas-frame:#FFFFFF;
}
[data-theme="night"]{
  --bg:#17150F; --bg-elevated:#211E16; --ink:#EDE3CE; --ink-soft:#B7AD93;
  --rule:#423C2C; --accent:#8CA9D4; --accent-soft:#293347; --signature:#C9A227;
  --card-bg:#241F17; --canvas-filter:brightness(.88) contrast(1.03); --canvas-frame:#0f0e0a;
}

*{ box-sizing:border-box; }
[hidden]{ display:none !important; }

html,body{
  margin:0; padding:0; height:100vh; height:100dvh; overflow:hidden;
  background:var(--bg); color:var(--ink); font-family:var(--font-ui);
  -webkit-tap-highlight-color:transparent;
}
#app{ position:fixed; inset:0; height:100vh; height:100dvh; overflow:hidden; }
button{ font-family:inherit; }

/* ============================= LAUNCHER & HUB ============================= */
.launcher{
  position:absolute; inset:0; overflow-y:auto; display:flex; align-items:flex-start;
  justify-content:center; padding:6vh 20px 40px;
}
.launcher-inner{ max-width:480px; width:100%; }
.masthead{ text-align:center; margin-bottom:32px; }
.masthead-kicker{
  display:block; font-family:var(--font-mono); font-size:11px; letter-spacing:.18em;
  color:var(--signature); margin-bottom:14px; font-weight:500;
}
.masthead-title{
  font-family:var(--font-display); font-weight:900; font-size:64px; line-height:.95;
  margin:0 0 14px; color:var(--ink);
}
.masthead-tagline{
  font-size:15px; line-height:1.55; color:var(--ink-soft); margin:0 auto; max-width:360px;
}
.launch-actions{ display:flex; flex-direction:column; gap:12px; margin-bottom:24px; }
.launch-card{
  display:block; text-align:left; border:1.5px solid var(--rule); border-radius:var(--radius);
  padding:16px 18px; background:var(--bg-elevated); cursor:pointer; transition:border-color .15s, transform .1s;
}
.launch-card:active{ transform:scale(.99); }
.launch-card:hover{ border-color:var(--accent); }
.launch-card-title{ display:block; font-weight:600; font-size:15px; margin-bottom:3px; }
.launch-card-sub{ display:block; font-size:12.5px; color:var(--ink-soft); }

/* Shared Papers Dashboard */
.hub-section{ margin-top:24px; border-top:1.5px solid var(--rule); padding-top:24px; }
.hub-title{ font-family:var(--font-display); font-size:22px; margin:0 0 12px; }
.hub-list{ display:flex; flex-direction:column; gap:8px; max-height:260px; overflow-y:auto; padding-right:4px; }
.hub-item{
  display:flex; justify-content:between; align-items:center; background:var(--bg-elevated);
  border:1px solid var(--rule); padding:11px 14px; border-radius:8px; cursor:pointer; font-size:14px;
}
.hub-item:hover{ border-color:var(--accent); }
.hub-item-name{ font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
.hub-item-date{ font-family:var(--font-mono); font-size:11px; color:var(--ink-soft); margin-left:12px; }
.hub-empty{ font-size:13px; color:var(--ink-soft); font-style:italic; text-align:center; padding:20px 0; }

/* ============================= TOOLBAR ============================= */
.toolbar{
  position:absolute; top:0; left:0; right:0; z-index:30; display:flex; align-items:center;
  gap:8px; padding:10px 12px; background:color-mix(in srgb, var(--bg-elevated) 92%, transparent);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--rule);
  transform:translateY(-100%); transition:transform .25s ease;
  overflow-x:auto; scrollbar-width:none;
}
.toolbar::-webkit-scrollbar{ display:none; }
.toolbar.visible{ transform:translateY(0); }
.tbtn-group{ display:flex; align-items:center; background:var(--bg); border-radius:8px; padding:2px; flex-shrink:0; }
.tbtn{
  border:none; background:transparent; color:var(--ink); font-size:15px; font-weight:600;
  padding:7px 11px; border-radius:6px; cursor:pointer; line-height:1;
}
.tbtn:hover{ background:var(--accent-soft); }
.page-indicator{ font-family:var(--font-mono); font-size:12.5px; color:var(--ink-soft); padding:0 6px; white-space:nowrap; }
#backBtn{ font-family:var(--font-ui); font-size:13px; }
.theme-dot{ width:22px; height:22px; border-radius:50%; padding:0; border:1.5px solid var(--rule); margin:0 2px; }
.theme-dot.paper{ background:#E7E0CB; } .theme-dot.bright{ background:#FFFFFF; } .theme-dot.night{ background:#17150F; }
.toolbar .theme-dot.active{ border-color:var(--signature); border-width:2px; }
.spacer{ flex:1; }

/* ============================= VIEWER (continuous scroll) ============================= */
.scroll-area{
  position:absolute; inset:0; overflow:auto; -webkit-overflow-scrolling:touch;
  touch-action:pan-y; background:var(--bg); padding:56px 14px 48px;
}
/* NOTE: intentionally NOT flex/justify-content:center on the scroller — that pattern
   clips the overflow on the start edge in many browsers, which is why the left side
   became unreachable when zoomed in. Plain block layout + margin:auto per page avoids
   that: pages center themselves when they fit, and simply left-align (fully
   scrollable in both directions) once they're wider than the viewport. */
.pages-container{ width:100%; }
.page-wrap{
  position:relative; display:block; margin:0 auto 16px; box-shadow:0 6px 24px rgba(0,0,0,.18);
  background:var(--canvas-frame); overflow:hidden;
}
.page-wrap .page-num-tag{
  position:absolute; top:8px; left:8px; font-family:var(--font-mono); font-size:10px;
  color:var(--ink-soft); background:color-mix(in srgb, var(--bg-elevated) 80%, transparent);
  padding:2px 6px; border-radius:4px; pointer-events:none; z-index:1;
}
.page-canvas{ display:block; filter:var(--canvas-filter); }
.text-layer{ position:absolute; top:0; left:0; pointer-events:none; }
.word{
  position:absolute; transform-origin:0 0; cursor:pointer; color:transparent;
  white-space:pre; line-height:1; pointer-events:auto;
}
.word:hover, .word.active-word{ background:color-mix(in srgb, var(--accent) 22%, transparent); border-radius:2px; }

/* ============================= WORD CARD ============================= */
.word-card{
  position:fixed; z-index:50; width:min(300px, calc(100vw - 24px)); background:var(--card-bg);
  border-radius:12px; box-shadow:0 12px 32px rgba(0,0,0,.28); border:1px solid var(--rule);
  padding:16px 16px 14px; opacity:0; transform:translateY(4px) scale(.98); transition:opacity .14s, transform .14s;
  pointer-events:none;
}
.word-card.show{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
.word-card::before{
  content:''; position:absolute; left:var(--arrow-x, 24px); width:14px; height:14px;
  background:var(--card-bg); border:1px solid var(--rule); transform:translateX(-50%) rotate(45deg);
}
.word-card.arrow-top::before{ top:-8px; border-right:none; border-bottom:none; }
.word-card.arrow-bottom::before{ bottom:-8px; border-left:none; border-top:none; }
.word-card-close{
  position:absolute; top:8px; right:10px; border:none; background:none; font-size:18px;
  color:var(--ink-soft); cursor:pointer; line-height:1; padding:4px;
}
.wc-word{ font-family:var(--font-display); font-weight:900; font-size:22px; text-transform:lowercase; color:var(--ink); }
.word-card-head{ margin-bottom:8px; padding-right:18px; border-bottom:1px solid var(--rule); padding-bottom:8px; }
.wc-section{ margin-top:10px; }
.wc-label{ font-family:var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--signature); margin-bottom:5px; }
.wc-chips{ display:flex; flex-wrap:wrap; gap:6px; }
.wc-chip{ background:var(--accent-soft); color:var(--accent); font-size:12.5px; padding:3px 9px; border-radius:20px; font-weight:500; }
.wc-hindi{ font-family:var(--font-hi); font-size:19px; font-weight:600; color:var(--ink); }
.wc-example{ font-size:13px; color:var(--ink-soft); line-height:1.5; font-style:italic; }
.wc-loading{ display:flex; align-items:center; gap:9px; font-size:13px; color:var(--ink-soft); padding:6px 0; }
.wc-spinner, .spinner-lg{
  display:inline-block; border-radius:50%; border:2px solid var(--rule); border-top-color:var(--signature);
  animation:spin .7s linear infinite; flex-shrink:0;
}
.wc-spinner{ width:14px; height:14px; }
.spinner-lg{ width:30px; height:30px; border-width:3px; margin-bottom:12px; }
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ============================= OVERLAYS ============================= */
.loading-overlay{
  position:absolute; inset:0; z-index:60; background:var(--bg); display:flex; flex-direction:column;
  align-items:center; justify-content:center; color:var(--ink-soft); font-size:13.5px;
}
.toast{
  position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(10px); z-index:70;
  background:var(--ink); color:var(--bg); font-size:13px; padding:11px 18px; border-radius:10px;
  max-width:calc(100vw - 40px); text-align:center; opacity:0; transition:opacity .2s, transform .2s; line-height:1.4;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- LAUNCHER -->
  <div id="launcher" class="launcher">
    <div class="launcher-inner">
      <div class="masthead">
        <span class="masthead-kicker">TAP · LEARN · SHARE</span>
        <h1 class="masthead-title">Shabd</h1>
        <p class="masthead-tagline">A shared newspaper reader. Upload a paper to instantly share it with your friends.</p>
      </div>

      <div class="launch-actions">
        <label class="launch-card" for="fileInput">
          <span class="launch-card-title">Upload & Open a PDF</span>
          <span class="launch-card-sub">Saved to the shared cloud database instantly</span>
        </label>
        <input type="file" id="fileInput" accept="application/pdf" hidden />
      </div>

      <!-- SHARED PAPERS HUB -->
      <div class="hub-section">
        <h2 class="hub-title">Shared Newspapers</h2>
        <div id="hubList" class="hub-list">
          <div class="hub-empty">Connecting to cloud storage…</div>
        </div>
      </div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div id="toolbar" class="toolbar">
    <button id="backBtn" class="tbtn" title="Open another PDF">‹ Hub</button>
    <div class="tbtn-group">
      <button id="prevBtn" class="tbtn">‹</button>
      <span id="pageIndicator" class="page-indicator">1 / 1</span>
      <button id="nextBtn" class="tbtn">›</button>
    </div>
    <div class="tbtn-group">
      <button id="zoomOutBtn" class="tbtn">–</button>
      <button id="fitBtn" class="tbtn">Fit</button>
      <button id="zoomInBtn" class="tbtn">+</button>
    </div>
    <div class="spacer"></div>
    <div class="tbtn-group theme-group">
      <button class="tbtn theme-dot paper" data-theme="paper"></button>
      <button class="tbtn theme-dot bright" data-theme="bright"></button>
      <button class="tbtn theme-dot night" data-theme="night"></button>
    </div>
  </div>

  <!-- VIEWER: continuous, all pages stacked one below another -->
  <div id="scrollArea" class="scroll-area" hidden>
    <div id="pagesContainer" class="pages-container"></div>
  </div>

  <!-- WORD CARD -->
  <div id="wordCard" class="word-card" hidden>
    <button class="word-card-close" id="wcClose">&times;</button>
    <div class="word-card-head"><span id="wcWord" class="wc-word"></span></div>
    <div id="wcBody" class="word-card-body"></div>
  </div>

  <!-- OVERLAYS -->
  <div id="loadingOverlay" class="loading-overlay" hidden>
    <div class="spinner-lg"></div>
    <div id="loadingLabel">Processing PDF…</div>
  </div>
  <div id="toast" class="toast" hidden></div>

</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="module">
/* ---------------------------------------------------------------- *
 *  SUPABASE SETUP
 * ---------------------------------------------------------------- */
const SUPABASE_URL = "https://oixfzmxhiabckcqoykgk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9peGZ6bXhoaWFiY2tjcW95a2drIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNjg2NzEsImV4cCI6MjA5OTg0NDY3MX0.q_D8Q6iCjJ4mk-cJodlbAUgMpcdwlx1k2Bo0SfyMRDc";
const BUCKET_NAME = "newspapers";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const pdfjsLib = window.pdfjsLib;
if(pdfjsLib && pdfjsLib.GlobalWorkerOptions){
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

/* ---------------------------------------------------------------- *
 *  DOM Elements
 * ---------------------------------------------------------------- */
const launcher = document.getElementById('launcher');
const fileInput = document.getElementById('fileInput');
const hubList = document.getElementById('hubList');
const toolbar = document.getElementById('toolbar');
const backBtn = document.getElementById('backBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const pageIndicator = document.getElementById('pageIndicator');
const zoomInBtn = document.getElementById('zoomInBtn');
const zoomOutBtn = document.getElementById('zoomOutBtn');
const fitBtn = document.getElementById('fitBtn');
const scrollArea = document.getElementById('scrollArea');
const pagesContainer = document.getElementById('pagesContainer');
const wordCard = document.getElementById('wordCard');
const wcClose = document.getElementById('wcClose');
const wcWord = document.getElementById('wcWord');
const wcBody = document.getElementById('wcBody');
const loadingOverlay = document.getElementById('loadingOverlay');
const loadingLabel = document.getElementById('loadingLabel');
const toast = document.getElementById('toast');

/* ---------------------------------------------------------------- *
 *  State Variables
 * ---------------------------------------------------------------- */
let pdfDoc = null;
let totalPages = 1;
let currentPage = 1;
let scale = 1;            // scale currently being targeted (live during pinch)
let committedScale = 1;   // scale actually baked into page-wrap sizes right now
let userZoomed = false;

let pageWraps = [];        // [{baseWidth,baseHeight,el,canvas,textLayer,rendered,renderedScale,gen}]
let pageObserver = null;

let lastWord = '', lastContext = '', lastSpanEl = null;

let initialPinchDist = 0;
let pinchStartScale = 1;
let pinchOriginX = 0, pinchOriginY = 0; // content-local coords (relative to pagesContainer's top-left)

const DPR = Math.min(window.devicePixelRatio || 1, 3);
const measureCanvas = document.createElement('canvas');
const measureCtx = measureCanvas.getContext('2d');

/* ---------------------------------------------------------------- *
 *  Supabase Cloud Operations
 * ---------------------------------------------------------------- */
async function loadHubPapers() {
  try {
    const { data, error } = await supabase.storage.from(BUCKET_NAME).list('', {
      limit: 50,
      sortBy: { column: 'created_at', order: 'desc' }
    });

    if (error) throw error;

    if (!data || data.length === 0) {
      hubList.innerHTML = `<div class="hub-empty">No newspapers uploaded yet. Upload one above!</div>`;
      return;
    }

    hubList.innerHTML = '';
    data.forEach(file => {
      if(file.name === '.emptyFolderPlaceholder') return;

      const date = new Date(file.created_at).toLocaleDateString(undefined, {month:'short', day:'numeric'});
      const item = document.createElement('div');
      item.className = 'hub-item';
      item.innerHTML = `
        <span class="hub-item-name">${escapeHtml(file.name)}</span>
        <span class="hub-item-date">${date}</span>
      `;
      item.addEventListener('click', () => fetchAndLoadCloudFile(file.name));
      hubList.appendChild(item);
    });
  } catch (err) {
    console.error(err);
    hubList.innerHTML = `<div class="hub-empty" style="color:var(--signature)">Failed to load dashboard. Ensure bucket is public.</div>`;
  }
}

async function fetchAndLoadCloudFile(fileName) {
  loadingLabel.textContent = 'Downloading from storage...';
  loadingOverlay.hidden = false;
  try {
    const { data, error } = await supabase.storage.from(BUCKET_NAME).download(fileName);
    if (error) throw error;
    const buf = await data.arrayBuffer();
    await loadPdfFromArrayBuffer(buf, fileName);
  } catch (err) {
    showToast("Error acquiring cloud file framework.");
    loadingOverlay.hidden = true;
  }
}

fileInput.addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  loadingLabel.textContent = 'Uploading to dashboard...';
  loadingOverlay.hidden = false;

  try {
    const uniqueName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_')}`;
    const { error } = await supabase.storage.from(BUCKET_NAME).upload(uniqueName, file);
    if (error) throw error;

    showToast("Upload Successful!");
    const buf = await file.arrayBuffer();
    await loadPdfFromArrayBuffer(buf, file.name);
    loadHubPapers();
  } catch (err) {
    console.error(err);
    showToast("Upload error. Confirm storage config rules.");
    loadingOverlay.hidden = true;
  }
});

/* ---------------------------------------------------------------- *
 *  Helpers
 * ---------------------------------------------------------------- */
function escapeHtml(str){ return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }

let toastTimer;
function showToast(msg){
  toast.textContent = msg; toast.hidden = false;
  requestAnimationFrame(()=>toast.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ toast.classList.remove('show'); setTimeout(()=>toast.hidden=true,200); }, 4000);
}

function mat2mul(a, b){
  return [
    a[0]*b[0] + a[2]*b[1], a[1]*b[0] + a[3]*b[1],
    a[0]*b[2] + a[2]*b[3], a[1]*b[2] + a[3]*b[3],
    a[0]*b[4] + a[2]*b[5] + a[4], a[1]*b[4] + a[3]*b[5] + a[5],
  ];
}

/* ---------------------------------------------------------------- *
 *  Document Load — build one placeholder wrap per page, lazily render
 * ---------------------------------------------------------------- */
async function loadPdfFromArrayBuffer(buf, name){
  if(pdfDoc){ try{ await pdfDoc.destroy(); }catch(e){} }
  if(pageObserver){ pageObserver.disconnect(); pageObserver = null; }
  pagesContainer.innerHTML = '';
  pageWraps = [];

  try{
    loadingLabel.textContent = 'Parsing elements...';
    const task = pdfjsLib.getDocument({ data: buf });
    pdfDoc = await task.promise;
    totalPages = pdfDoc.numPages;
    currentPage = 1;
    userZoomed = false;

    loadingLabel.textContent = 'Laying out pages...';
    const pages = await Promise.all(Array.from({length: totalPages}, (_, i) => pdfDoc.getPage(i+1)));
    const baseViewports = pages.map(p => p.getViewport({ scale: 1 }));

    scale = Math.max(0.3, (scrollArea.clientWidth - 28) / baseViewports[0].width);
    committedScale = scale;

    baseViewports.forEach((bv, idx)=>{
      const wrap = document.createElement('div');
      wrap.className = 'page-wrap';
      wrap.dataset.pageNum = String(idx+1);
      wrap.style.width = (bv.width * scale) + 'px';
      wrap.style.height = (bv.height * scale) + 'px';
      const tag = document.createElement('span');
      tag.className = 'page-num-tag';
      tag.textContent = `${idx+1} / ${totalPages}`;
      wrap.appendChild(tag);
      pagesContainer.appendChild(wrap);

      pageWraps.push({
        baseWidth: bv.width, baseHeight: bv.height,
        el: wrap, canvas: null, textLayer: null,
        rendered: false, renderedScale: 0, gen: 0
      });
    });

    launcher.hidden = true;
    scrollArea.hidden = false;
    scrollArea.scrollTop = 0;
    bumpToolbar();
    updatePageIndicator();

    pageObserver = new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if(!entry.isIntersecting) return;
        const idx = parseInt(entry.target.dataset.pageNum, 10) - 1;
        const pw = pageWraps[idx];
        if(pw && (!pw.rendered || pw.renderedScale !== scale)){
          renderPageInto(idx);
        }
      });
    }, { root: scrollArea, rootMargin: '900px 0px 900px 0px', threshold: 0.01 });

    pageWraps.forEach(pw => pageObserver.observe(pw.el));

  }catch(err){
    console.error(err);
    showToast("Rendering engine baseline crash.");
  }finally{
    loadingOverlay.hidden = true;
  }
}

/* ---------------------------------------------------------------- *
 *  Per-page render, double-buffered (build offscreen, swap in one go)
 *  so the visible canvas is never cleared/blank while re-rendering.
 * ---------------------------------------------------------------- */
async function renderPageInto(idx){
  const pw = pageWraps[idx];
  if(!pw || !pdfDoc) return;
  const myGen = ++pw.gen;
  const targetScale = scale;

  let pdfPage;
  try{ pdfPage = await pdfDoc.getPage(idx+1); }catch(e){ return; }
  if(myGen !== pw.gen) return;

  const viewport = pdfPage.getViewport({ scale: targetScale });

  const newCanvas = document.createElement('canvas');
  newCanvas.className = 'page-canvas';
  newCanvas.width = Math.floor(viewport.width * DPR);
  newCanvas.height = Math.floor(viewport.height * DPR);
  newCanvas.style.width = viewport.width + 'px';
  newCanvas.style.height = viewport.height + 'px';
  const ctx = newCanvas.getContext('2d');
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  const renderTask = pdfPage.render({ canvasContext: ctx, viewport });
  try{ await renderTask.promise; }catch(e){ return; }
  if(myGen !== pw.gen) return;

  let textContent;
  try{ textContent = await pdfPage.getTextContent(); }catch(e){ textContent = { items: [], styles: {} }; }
  if(myGen !== pw.gen) return;

  const newTextLayer = document.createElement('div');
  newTextLayer.className = 'text-layer';
  newTextLayer.style.width = viewport.width + 'px';
  newTextLayer.style.height = viewport.height + 'px';
  buildWordSpans(textContent, viewport, newTextLayer);

  // Atomic swap: old canvas/text-layer stay visible right up until replacement.
  pw.el.style.width = viewport.width + 'px';
  pw.el.style.height = viewport.height + 'px';
  if(pw.canvas) pw.el.replaceChild(newCanvas, pw.canvas); else pw.el.appendChild(newCanvas);
  if(pw.textLayer) pw.el.replaceChild(newTextLayer, pw.textLayer); else pw.el.appendChild(newTextLayer);
  pw.canvas = newCanvas;
  pw.textLayer = newTextLayer;
  pw.rendered = true;
  pw.renderedScale = targetScale;
}

function buildWordSpans(textContent, viewport, container){
  const items = textContent.items;
  const styles = textContent.styles || {};
  const frag = document.createDocumentFragment();

  for(let i=0; i<items.length; i++){
    const item = items[i];
    if(!item.str || !item.str.trim()) continue;

    const tx = mat2mul(viewport.transform, item.transform);
    const angle = Math.atan2(tx[1], tx[0]);
    const fontHeight = Math.hypot(tx[2], tx[3]) || 10;
    const styleInfo = styles[item.fontName] || {};
    const fontFamily = styleInfo.fontFamily || 'sans-serif';
    const itemWidthPx = (item.width || 0) * viewport.scale;
    const ascent = fontHeight * 0.82;

    let left = Math.abs(angle) < 0.01 ? tx[4] : tx[4] + ascent * Math.sin(angle);
    let top = Math.abs(angle) < 0.01 ? tx[5] - ascent : tx[5] - ascent * Math.cos(angle);

    const context = ((items[i-1]?.str || '') + ' ' + item.str + ' ' + (items[i+1]?.str || '')).trim().slice(0, 220);
    const tokens = item.str.split(/(\s+)/).filter(Boolean);
    measureCtx.font = `${Math.max(fontHeight,6)}px ${fontFamily}`;
    const measured = tokens.map(t => measureCtx.measureText(t).width || (t.length * fontHeight * 0.5));
    const totalMeasured = measured.reduce((a,b)=>a+b, 0) || 1;
    const norm = itemWidthPx > 0 ? itemWidthPx / totalMeasured : 1;

    let cursor = 0;
    for(let j=0; j<tokens.length; j++){
      const tok = tokens[j];
      const w = measured[j] * norm;
      if(tok.trim()){
        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = tok;
        span.style.left = (left + cursor * Math.cos(angle)) + 'px';
        span.style.top = (top + cursor * Math.sin(angle)) + 'px';
        span.style.width = Math.max(w, 2) + 'px';
        span.style.height = (fontHeight * 0.95) + 'px';
        span.style.fontSize = fontHeight + 'px';
        span.style.fontFamily = fontFamily;
        span.dataset.context = context;
        frag.appendChild(span);
      }
      cursor += w;
    }
  }
  container.appendChild(frag);
}

pagesContainer.addEventListener('click', (e)=>{
  const span = e.target.closest('.word');
  if(!span) return;
  e.stopPropagation();
  onWordClick(span.textContent, span.dataset.context || '', span);
});

/* ---------------------------------------------------------------- *
 *  Dictionary Mechanics
 * ---------------------------------------------------------------- */
async function onWordClick(raw, context, spanEl){
  const word = raw.replace(/^[^A-Za-z]+/, '').replace(/[^A-Za-z]+$/, '');
  if(!word || word.length < 2) return;

  document.querySelectorAll('.word.active-word').forEach(s=>s.classList.remove('active-word'));
  spanEl.classList.add('active-word');
  lastWord = word; lastContext = context; lastSpanEl = spanEl;

  positionCardNear(spanEl);
  wcWord.textContent = word.toLowerCase();
  wcBody.innerHTML = `<div class="wc-loading"><span class="wc-spinner"></span>looking it up…</div>`;
  wordCard.hidden = false;
  wordCard.classList.add('show');

  try {
    const [defRes, hiRes] = await Promise.allSettled([
      fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word.toLowerCase())).then(r => r.json()),
      fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|hi`).then(r => r.json())
    ]);

    let meanings = [word], example = context || 'No sample generated.';
    if(defRes.status === 'fulfilled' && Array.isArray(defRes.value) && defRes.value[0]){
      const entry = defRes.value[0];
      meanings = entry.meanings?.[0]?.definitions?.map(d=>d.definition.split(',')[0]).slice(0,3) || meanings;
      example = entry.meanings?.[0]?.definitions?.[0]?.example || example;
    }
    let hindi = hiRes.status === 'fulfilled' ? hiRes.value?.responseData?.translatedText || '—' : '—';

    if(word === lastWord){
      wcBody.innerHTML = `
        <div class="wc-section"><div class="wc-label">Meanings</div><div class="wc-chips">${meanings.map(m=>`<span class="wc-chip">${escapeHtml(m)}</span>`).join('')}</div></div>
        <div class="wc-section"><div class="wc-label">Hindi</div><div class="wc-hindi">${escapeHtml(hindi)}</div></div>
        <div class="wc-section"><div class="wc-label">Example</div><div class="wc-example">${escapeHtml(example)}</div></div>`;
      positionCardNear(spanEl);
    }
  } catch (err) {
    wcBody.innerHTML = `<div class="wc-error">Lookup failed.</div>`;
  }
}

function positionCardNear(spanEl){
  const rect = spanEl.getBoundingClientRect();
  const cw = wordCard.offsetWidth || 280, ch = wordCard.offsetHeight || 170;
  let x = Math.max(12, Math.min(window.innerWidth - cw - 12, rect.left + rect.width/2 - cw/2));
  let y = rect.bottom + 12, arrowTop = true;
  if(y + ch > window.innerHeight - 12){ y = rect.top - ch - 12; arrowTop = false; }
  wordCard.style.left = x + 'px'; wordCard.style.top = Math.max(8, y) + 'px';
  wordCard.classList.toggle('arrow-top', arrowTop); wordCard.classList.toggle('arrow-bottom', !arrowTop);
  wordCard.style.setProperty('--arrow-x', Math.max(16, Math.min(cw-16, rect.left + rect.width/2 - x)) + 'px');
}

function hideCard(){
  wordCard.classList.remove('show');
  document.querySelectorAll('.word.active-word').forEach(s=>s.classList.remove('active-word'));
  setTimeout(()=>{ if(!wordCard.classList.contains('show')) wordCard.hidden = true; }, 160);
}
wcClose.addEventListener('click', hideCard);
document.addEventListener('click', (e)=>{ if(!wordCard.hidden && !wordCard.contains(e.target) && !e.target.closest('.word')) hideCard(); });

/* ---------------------------------------------------------------- *
 *  Toolbar visibility / current-page tracking
 * ---------------------------------------------------------------- */
let hideTimer;
function bumpToolbar(){ toolbar.classList.add('visible'); clearTimeout(hideTimer); hideTimer = setTimeout(()=>toolbar.classList.remove('visible'), 3200); }

function updatePageIndicator(){
  const areaRect = scrollArea.getBoundingClientRect();
  const refY = areaRect.top + 70;
  let best = 1, bestDist = Infinity;
  pageWraps.forEach((pw, idx)=>{
    const r = pw.el.getBoundingClientRect();
    if(r.bottom < areaRect.top || r.top > areaRect.bottom) return;
    const dist = Math.abs(r.top - refY);
    if(dist < bestDist){ bestDist = dist; best = idx+1; }
  });
  currentPage = best;
  pageIndicator.textContent = `${currentPage} / ${totalPages}`;
}

scrollArea.addEventListener('scroll', debounce(()=>{
  updatePageIndicator();
  bumpToolbar();
}, 60), { passive: true });

function toggleFullscreen(){
  const el = document.documentElement;
  const isFs = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
  if(!isFs){
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if(req) req.call(el).catch(()=>{});
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
    if(exit) exit.call(document).catch(()=>{});
  }
}
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange'].forEach(evt=>{
  document.addEventListener(evt, ()=>{ if(pdfDoc && !userZoomed) recomputeFitAndApply(); });
});

// Single tap toggles the toolbar; a second tap within the window toggles fullscreen instead.
let tapCount = 0, tapTimer = null;
const DOUBLE_TAP_MS = 280;
scrollArea.addEventListener('click', (e)=>{
  if(e.target !== scrollArea && e.target !== pagesContainer) return;
  tapCount++;
  if(tapCount === 1){
    tapTimer = setTimeout(()=>{
      toolbar.classList.contains('visible') ? toolbar.classList.remove('visible') : bumpToolbar();
      tapCount = 0;
    }, DOUBLE_TAP_MS);
  } else {
    clearTimeout(tapTimer);
    tapCount = 0;
    toggleFullscreen();
  }
});

function goToPage(n){
  n = Math.max(1, Math.min(totalPages, n));
  const pw = pageWraps[n-1];
  if(!pw) return;
  const rect = pw.el.getBoundingClientRect();
  const areaRect = scrollArea.getBoundingClientRect();
  const targetTop = scrollArea.scrollTop + (rect.top - areaRect.top) - 12;
  scrollArea.scrollTo({ top: targetTop, behavior: 'smooth' });
}
prevBtn.addEventListener('click', ()=> goToPage(currentPage - 1));
nextBtn.addEventListener('click', ()=> goToPage(currentPage + 1));
backBtn.addEventListener('click', () => {
  scrollArea.hidden = true; launcher.hidden = false; toolbar.classList.remove('visible');
  hideCard(); pdfDoc = null; loadHubPapers();
});

/* ---------------------------------------------------------------- *
 *  Zoom — instant CSS preview on the whole stack, then a single
 *  flicker-free commit (resize + double-buffered re-render).
 * ---------------------------------------------------------------- */
function contentLocalPoint(viewportX, viewportY){
  const contRect = pagesContainer.getBoundingClientRect();
  return { x: viewportX - contRect.left, y: viewportY - contRect.top };
}

function commitZoomAt(oldScale, anchorX, anchorY){
  const factor = scale / oldScale;

  pageWraps.forEach(pw => {
    pw.el.style.width = (pw.baseWidth * scale) + 'px';
    pw.el.style.height = (pw.baseHeight * scale) + 'px';
  });
  pagesContainer.style.transform = 'none';
  pagesContainer.style.transformOrigin = '';

  if(Math.abs(factor - 1) > 0.001){
    scrollArea.scrollLeft += anchorX * (factor - 1);
    scrollArea.scrollTop  += anchorY * (factor - 1);
  }

  hideCard();
  committedScale = scale;
  // Re-render only pages that were already rendered — keeps zoom cheap and
  // still-offscreen pages simply pick up the new scale via the observer later.
  pageWraps.forEach((pw, idx) => { if(pw.rendered) renderPageInto(idx); });
  updatePageIndicator();
}

function recomputeFitAndApply(){
  if(!pageWraps.length) return;
  const oldScale = committedScale;
  scale = Math.max(0.3, (scrollArea.clientWidth - 28) / pageWraps[0].baseWidth);
  const p = contentLocalPoint(scrollArea.getBoundingClientRect().left + scrollArea.clientWidth/2,
                               scrollArea.getBoundingClientRect().top + scrollArea.clientHeight/2);
  commitZoomAt(oldScale, p.x, p.y);
}

function zoomByFactor(factor){
  const oldScale = committedScale;
  scale = Math.min(4, Math.max(0.3, committedScale * factor));
  userZoomed = true;
  const areaRect = scrollArea.getBoundingClientRect();
  const p = contentLocalPoint(areaRect.left + areaRect.width/2, areaRect.top + areaRect.height/2);
  commitZoomAt(oldScale, p.x, p.y);
}
zoomInBtn.addEventListener('click', ()=> zoomByFactor(1.2));
zoomOutBtn.addEventListener('click', ()=> zoomByFactor(1/1.2));
fitBtn.addEventListener('click', ()=>{ userZoomed = false; recomputeFitAndApply(); });

/* Pinch-to-zoom: two-finger gesture only. Single-finger scroll is left to
   the browser's native, buttery-smooth vertical scrolling (touch-action:pan-y). */
scrollArea.addEventListener('touchstart', (e)=>{
  if(e.touches.length === 2){
    initialPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    pinchStartScale = committedScale;
    scale = committedScale;
    const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const p = contentLocalPoint(midX, midY);
    pinchOriginX = p.x; pinchOriginY = p.y;
  }
}, { passive: false });

scrollArea.addEventListener('touchmove', (e)=>{
  if(e.touches.length === 2 && initialPinchDist > 0){
    e.preventDefault();
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const newScale = Math.min(4, Math.max(0.3, pinchStartScale * (dist / initialPinchDist)));
    if(Math.abs(newScale - scale) > 0.01){
      scale = newScale;
      userZoomed = true;
      pagesContainer.style.transformOrigin = `${pinchOriginX}px ${pinchOriginY}px`;
      pagesContainer.style.transform = `scale(${scale / committedScale})`;
    }
  }
}, { passive: false });

scrollArea.addEventListener('touchend', (e)=>{
  if(e.touches.length < 2 && initialPinchDist > 0){
    commitZoomAt(pinchStartScale, pinchOriginX, pinchOriginY);
    initialPinchDist = 0;
  }
}, { passive: true });

/* Themes initialization logic */
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); document.querySelectorAll('.theme-dot').forEach(b=>b.classList.toggle('active', b.dataset.theme===t)); }
document.querySelectorAll('.theme-dot').forEach(b=>b.addEventListener('click', ()=>applyTheme(b.dataset.theme)));

// Run on page launch
loadHubPapers();
applyTheme('paper');
</script>
